<!-- ./index.html-->
<!DOCTYPE html>
<html lang="pt-br"> <!--Define o idioma principal-->

<head> <!--Metadados. É tudo o que o navegador precisa saber sobre a página antes de começar a desenhá-la.-->
    <meta charset="UTF-8">
    <!--Garante que o navegador entenda símbolos especiais, emojis e, principalmente, acentuação (ã, é, ç).-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <!--"initial-scale=1.0" = Zoom inicial-->
    <!--""width=device-width" = Usa a largura real da tela do aparelho-->
    <title>CripChat</title>
    <!--Para leitores de tela (usados por cegos), o title é a primeira coisa lida. É o que ajuda o usuário a saber em qual site ele "aterrizou".-->
    <link id="theme-dark" rel="stylesheet" href="./src/styles_vanilla/index.css">
    <!--↑ 'disabled', o navegador baixa o arquivo (fica em cache), mas não aplica as cores ainda ↑-->

    <link rel="icon" href="data:,"> <!--Não procura o favicon.ico-->
</head>

<body>
    <main class="login-card">
        <header>
            <button id="theme-toggle" class="theme-btn" aria-hidden="true" tabindex="-1" disabled >[1]</button>
            <h1 class="glitch" aria-label="Crip Chat">CrypChat</h1>
        </header>

        <form id="login-form">
            <fieldset disabled id="FGC" class="field-group-connection">
                <legend>Modo de Conexão</legend>
                <!-- <legend>: É uma tag que explica para Leitores de Tela o que o usuário deve fazer dentro do quadrado.-->
                <label class="radio-label">
                    <input type="radio" name="caminho" value="local" aria-label="Servidor Crip Chat Status Offline">
                    <span class="text-label" aria-hidden="true">[ Servidor CrypChat ]</span>
                    <span class="status-dot offline" role="img"></span>
                </label>

                <label class="radio-label">
                    <input type="radio" name="caminho" value="cloud" aria-label="Servidor Google Status Offline">
                    <span class="text-label" aria-hidden="true">[ Servidor Google ]</span>
                    <span class="status-dot offline" role="img"></span>
                </label>

            </fieldset>

            <fieldset disabled id="FGIF" class="field-group-interface">
                <legend>Interface</legend>
                <label>
                    <input type="radio" name="modo" value="vanilla"> Leve matrix
                </label>
                <label>
                    <input style="cursor: not-allowed;" type="radio" name="modo" value="vue"> Normal
                </label>
            </fieldset>

            <div class="auth-fields">
                <label>
                    <span style="opacity: 0.3;" >USUÁRIO</span>
                    <input id="login-user" type="email" required disabled>
                </label>
                <label>
                    <span style="opacity: 0.3;" >SENHA</span>
                    <input id="login-pass" type="password" required disabled>
                </label>
            </div>

            <div class="btn">
                <button type="button" class="btn-register" disabled >REGISTRAR_</button>
                <button type="button" class="btn-connect"  disabled >CONECTAR_</button>
            </div>
        </form>

        <!--↓ Modal ↓-->
        <dialog id="modal-register" class="login-card modal-estilo">
            <form method="dialog">
                <h2>Solicitar Registro_</h2>

                <div class="auth-fields">
                    <label>
                        <span>Nome_</span>
                        <input id="reg-name" type="text" required>
                    </label>

                    <label>
                        <span>E-mail_</span>
                        <input id="reg-email" type="email" required>
                    </label>

                    <label>
                        <span>Senha_</span>
                        <input id="reg-password" type="password" required>
                    </label>
                </div>

                <div class="btn">
                    <button type="button" class="btn-cancel">CANCELAR_</button>
                    <button type="button" class="btn-request" style="cursor: not-allowed; opacity: 0.3;" disabled >SOLICITAR_</button>
                </div>
            </form>
        </dialog>
        <!--↑ Modal ↑-->

        <footer>
            <!--<footer>: Define o rodapé. É onde colocamos informações secundárias que não fazem parte do fluxo principal de login.-->
            <button id="version-display" class="btn-info" style="cursor: not-allowed; opacity: 0.3;" disabled >InfoVersão</button>
        </footer>
    </main>

    <script type="module" src="./src/scripts/set_theme.js"></script>
    <script type="module" src="./src/scripts/version.js"></script>
    <script type="module" src="./src/scripts/loginPage/modal_register.js"></script>
    <script type="module" src="./src/scripts/loginPage/login_page.js"></script>
</body>

</html>
